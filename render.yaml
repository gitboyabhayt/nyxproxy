services:
  - type: web
    name: nyxproxy-backend
    runtime: python
    plan: free
    rootDir: apps/backend
    buildCommand: pip install -e .
    startCommand: uvicorn nyxproxy_backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: ALLOWED_ORIGINS
        value: "*"
      # Provide the providers you want available. Leave a value blank to disable.
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: CLOUDFLARE_API_TOKEN
        sync: false
      - key: CLOUDFLARE_ACCOUNT_ID
        sync: false
      - key: GITHUB_MODELS_TOKEN
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: BYTEZ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OLLAMA_BASE_URL
        sync: false
      - key: NYX_BACKEND_TOKEN
        sync: false
